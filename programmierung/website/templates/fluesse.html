<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energiesystem Lausitz - Energieflüsse</title>
    <link rel="stylesheet" href="/static/fluesse.css">
</head>
<body>
    <div id="system">
        <svg id="grid"></svg>
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Zurück
        </a>
        <div class="title-bar">
            <h1>Energiesystem Lausitz</h1>
            <p>Energiefluss-Diagramm</p>
        </div>
        <div class="legend" id="system-legend">
            <div class="legend-item active" id="legend-item-1"><div class="legend-line green" id="legend-line-1"></div><span id="legend-text-1">Stromerzeugung</span></div>
            <div class="legend-item active" id="legend-item-2"><div class="legend-line yellow" id="legend-line-2"></div><span id="legend-text-2">Verteilung</span></div>
            <div class="legend-item active"><div class="legend-line grey"></div>Passiv</div>
        </div>
        <div class="system-switch">
            <button class="system-btn active" id="btn-power" onclick="setActiveSystem('power')">
                <span class="btn-icon">⚡</span> Strom
            </button>
            <button class="system-btn" id="btn-heat" onclick="setActiveSystem('heat')">
                <span class="btn-icon">🔥</span> Wärme
            </button>
        </div>

        <!-- Modal Overlay -->
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">
                        <span class="modal-icon" id="modal-icon">🏭</span>
                        <div>
                            <h2 id="modal-title">Kohlekraftwerk</h2>
                            <div class="modal-subtitle" id="modal-subtitle">Kraftwerk</div>
                        </div>
                    </div>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-visual">
                        <div class="modal-visual-icon" id="modal-visual-icon">🏭</div>
                        <div class="modal-visual-label" id="modal-visual-label">Kohlekraftwerk</div>
                    </div>
                    <div class="modal-content">
                        <div class="modal-state">
                            <div class="state-indicator">
                                <div class="state-dot" id="state-dot"></div>
                                <span class="state-label" id="state-label">Aus</span>
                            </div>
                            <div class="state-buttons" id="state-buttons">
                                <!-- State buttons will be inserted here -->
                            </div>
                        </div>
                        <div class="modal-description" id="modal-description">
                            Beschreibung wird geladen...
                        </div>
                        <div class="modal-section-title">Szenarien</div>
                        <div class="scenario-buttons" id="scenario-buttons">
                            <!-- Scenario buttons will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/fluesse_config.js"></script>
    <script src="/static/fluesse_utils.js"></script>
    <script src="/static/fluesse_modal.js"></script>
    <script src="/static/fluesse_core.js"></script>
</body>
</html>
